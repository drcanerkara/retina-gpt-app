name: Rebuild Retina RAG Index

on:
  workflow_dispatch:
  push:
    paths:
      - "data/corpus_cards/**"
      - "rag/**"
      - "requirements.txt"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install faiss-cpu

      - name: Build FAISS index
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python rag/ingest_cards.py

      - name: Commit index files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.faiss data/meta.json || true
          git commit -m "Rebuild RAG index" || echo "No changes to commit"
          git push
